# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-serve
  namespace: docling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-serve
  template:
    metadata:
      labels:
        app: docling-serve
    spec:
      containers:
      - name: docling-serve
        image: ghcr.io/docling-project/docling-serve-cu124
        ports:
        - containerPort: 5001
        env:
            - name: DOCLING_SERVE_ENABLE_UI
              value: "true"
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1
      nodeSelector:
        cloud.google.com/gke-nodepool: gpu-pool
